server:
  host: "0.0.0.0"
  port: 6379
  read_timeout: 30s
  write_timeout: 30s
  max_connections: 10000

redis:
  address: "localhost:6380"
  pool_size: 100
  min_idle_conns: 10
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  max_retries: 2

# pattern specific policies can be overridden from defaults
# defaults:
#   ttl: 10s
#   min_ttl: 5s

# GLobal kill switch
aegis:
  tags: true
  hot_keys: true
  singleflight: true
  metrics: true

# these thresholds only global 
hot_keys:
  max_tracked: 10000        # system wide memory cap
  cleanup_interval: 10s     # how often stale hot key records are checked
  stale_after: 1m           # if a hot key has not been increased in this long, it is considered stale
  min_extend_interval: 30s  # don't re-extend more than once per tis time period

policies:
  - name: "user-profiles"
    match:
      pattern: "user:*"
    config:
      ttl: 60s
      # min_ttl: 5s
      max_ttl: 10m
      singleflight: true
      tags: [users,profile]
      hot_key:
        enabled: true
        window: 2s
        threshold: 100
        ttl_multiplier: 3
     

  - name: "feed-cache"
    match:
      pattern: "feed:*"
    config:
      ttl: 15s
      singleflight: true
      tags: [feed]
      hot_key:
        enabled: true
        window: 1s
        threshold: 500
        ttl_multiplier: 2

  - name: "session-keys"
    match:
      pattern: "session:*"
    config:
      ttl: 30m
      singleflight: false
      hot_key:
        enabled: false