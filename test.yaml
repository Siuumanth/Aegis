server:
  port: 6379

# 1. TEST CASE: Missing 'defaults' and 'hot_keys' global blocks
# This tests if your code handles nil pointers for cfg.Defaults and cfg.HotKeys
# aegis:
#   hot_keys: true (Implicitly true if not set, or false? Tests your mergeGlobal)

# 2. TEST CASE: Feature Kill-Switches
aegis:
  tags: false         # Should nullify 'tags' in all policies
  hot_keys: true      # Should allow hot_key logic to proceed
  singleflight: false # Should set pc.Singleflight to false if not explicit

policies:
  # 3. EDGE CASE: The "Eternal" Key
  - name: "no-expiry-test"
    match:
      pattern: "forever:*"
    config:
      ttl: 837s # Should NOT be overridden by your DefaultTTL (e.g. 10s)
      # All other fields are nil. Tests your fallback to DefaultMinTTL/MaxTTL
      tags: [forever]

  # 4. EDGE CASE: Conflicting TTL Bounds
  - name: "normalization-test"
    match:
      pattern: "conflict:*"
    config:
      ttl: 2s
      min_ttl: 10s # TTL is < Min. Should be normalized to 10s.
      max_ttl: 5s  # Now TTL (10s) is > Max. Should finally be normalized to 5s.

  # 5. EDGE CASE: Incomplete HotKey Config
  - name: "partial-hotkey"
    match:
      pattern: "hot:*"
    config:
      hot_key:
        enabled: true
        # window, threshold, and multiplier are MISSING (nil/0)
        # Tests if your mergeDefaults fills these with DefaultHotKeyWindow etc.

  # 6. EDGE CASE: The "Empty" Policy
  - name: "ghost-policy"
    match:
      pattern: "ghost:*"
    config:
      # EVERYTHING IS NIL. 
      # Tests if your fallback chain can handle a policy that provides zero hints.

  # 7. EDGE CASE: Large Multiplier (Float test)
  - name: "float-multiplier-test"
    match:
      pattern: "stats:*"
    config:
      ttl: 10s
      hot_key:
        enabled: false
        ttl_multiplier: 1.5 # Tests your time.Duration(float64 * duration) logic

  # 8. EDGE CASE: Disabled Feature at Policy Level
  - name: "force-disabled"
    match:
      pattern: "secure:*"
    config:
      singleflight: false # Should remain false even if aegis.singleflight is true
      hot_key:
        enabled: false    # Should not trigger any HotKey default merging